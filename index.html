<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── TOP BAR ── -->
  <header class="topbar">
    <div class="greeting-block">
      <p id="greeting" class="greeting-text">Good morning!</p>
      <p id="datetime" class="datetime-text"></p>
    </div>
    <button id="theme-toggle" class="btn-icon" title="Toggle light/dark mode">🌙</button>
  </header>

  <main class="dashboard">

    <!-- ── FOCUS TIMER ── -->
    <section class="card" id="timer-card">
      <h2 class="card-title">Focus Timer</h2>

      <div class="timer-duration-row">
        <label for="custom-minutes">Session length (min):</label>
        <input id="custom-minutes" type="number" min="1" max="120" value="25" />
        <button id="apply-duration" class="btn btn-sm">Apply</button>
      </div>

      <div class="timer-display" id="timer-display">25:00</div>

      <div class="timer-controls">
        <button id="timer-start" class="btn btn-primary">Start</button>
        <button id="timer-stop"  class="btn btn-secondary">Stop</button>
        <button id="timer-reset" class="btn btn-secondary">Reset</button>
      </div>
    </section>

    <!-- ── TO-DO LIST ── -->
    <section class="card" id="todo-card">
      <h2 class="card-title">To-Do List</h2>

      <div class="todo-input-row">
        <input id="todo-input" type="text" placeholder="Add a new task…" />
        <button id="todo-add" class="btn btn-primary">Add</button>
      </div>

      <div class="todo-sort-row">
        <label for="sort-select">Sort by:</label>
        <select id="sort-select">
          <option value="default">Default (newest first)</option>
          <option value="az">A → Z</option>
          <option value="za">Z → A</option>
          <option value="done">Done last</option>
        </select>
      </div>

      <ul id="todo-list" class="todo-list"></ul>
    </section>

    <!-- ── QUICK LINKS ── -->
    <section class="card" id="links-card">
      <h2 class="card-title">Quick Links</h2>

      <div class="link-input-row">
        <input id="link-name-input" type="text" placeholder="Label (e.g. YouTube)" />
        <input id="link-url-input"  type="url"  placeholder="https://…" />
        <button id="link-add" class="btn btn-primary">Add</button>
      </div>

      <div id="links-grid" class="links-grid"></div>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
